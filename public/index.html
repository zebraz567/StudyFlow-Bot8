<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow Bot</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.15);
            text-align:center;
            max-width:600px;
        }

        h1{
            color:#4CAF50;
        }

        p{
            font-size:18px;
            color:#555;
        }

        .status{
            margin-top:20px;
            color:green;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>📚 StudyFlow Bot</h1>

    <p>
        Your Slack Assignment Management Bot is running successfully.
    </p>

    <div class="status">
        ✅ Bot Status: Online
    </div>

    <br>

    <p>
        Built with Node.js, Slack Bolt and Railway.
    </p>

</div>

</body>
</html>
